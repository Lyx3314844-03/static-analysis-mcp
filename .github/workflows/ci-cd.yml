name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-node${{ matrix.node-version }}
        path: |
          coverage/
          *.log
        retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check for known vulnerabilities
      run: npm audit --json > audit-results.json
      continue-on-error: true

    - name: Upload audit results
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-results
        path: audit-results.json
        retention-days: 30

  publish-npm:
    name: Publish to NPM
    needs: [test, security-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build package
      run: npm pack

    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          *.tgz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'created'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create installation guide
      run: |
        cat > INSTALLATION_GUIDE.md << 'EOF'
        # Installation Guide for All Platforms
        
        ## Windows
        
        ### Option 1: Global Installation (Recommended)
        \`\`\`powershell
        npm install -g static-analysis-mcp
        static-analysis-mcp --help
        \`\`\`
        
        ### Option 2: Local Project Installation
        \`\`\`powershell
        cd your-project
        npm install static-analysis-mcp
        npx static-analysis-mcp --help
        \`\`\`
        
        ## macOS
        
        ### Option 1: Global Installation (Recommended)
        \`\`\`bash
        npm install -g static-analysis-mcp
        static-analysis-mcp --help
        \`\`\`
        
        ### Option 2: Local Project Installation
        \`\`\`bash
        cd your-project
        npm install static-analysis-mcp
        npx static-analysis-mcp --help
        \`\`\`
        
        ## Linux
        
        ### Option 1: Global Installation (Recommended)
        \`\`\`bash
        sudo npm install -g static-analysis-mcp
        static-analysis-mcp --help
        \`\`\`
        
        ### Option 2: Local Project Installation
        \`\`\`bash
        cd your-project
        npm install static-analysis-mcp
        npx static-analysis-mcp --help
        \`\`\`
        
        ## MCP Configuration
        
        Add to your MCP client configuration:
        
        \`\`\`json
        {
          "mcpServers": {
            "static-analysis": {
              "command": "npx",
              "args": ["static-analysis-mcp"]
            }
          }
        }
        \`\`\`
        
        ## Verify Installation
        
        \`\`\`bash
        # Check version
        static-analysis-mcp --version
        
        # Run with help
        static-analysis-mcp --help
        
        # Test with a sample file
        echo 'console.log("test");' > test.js
        static-analysis-mcp analyze_file --filePath test.js
        \`\`\`
        EOF

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.tgz
          INSTALLATION_GUIDE.md
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
