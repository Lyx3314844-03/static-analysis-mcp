rules:
  # ==================== Swift 语言规则 ====================
  
  - id: swift-insecure-nsuserdefaults
    patterns:
      - pattern: |
          UserDefaults.standard.set($SENSITIVE_DATA, forKey: $KEY)
      - metavariable-regex:
          metavariable: $SENSITIVE_DATA
          regex: "(?i)(password|token|secret|key)"
    message: "不应在 UserDefaults 中存储敏感数据"
    languages: [swift]
    severity: ERROR
    metadata:
      language: "swift"
      category: "security"
      cwe: "CWE-312"
    fix: |
      // ✅ 修复后
      import Security
      let query: [String: Any] = [
          kSecClass as String: kSecClassGenericPassword,
          kSecAttrAccount as String: "account",
          kSecValueData as String: password.data(using: .utf8)!
      ]
      SecItemAdd(query as CFDictionary, nil)

  - id: swift-weak-crypto
    patterns:
      - pattern: |
          CC_MD5($DATA, ...)
      - pattern: |
          CC_SHA1($DATA, ...)
    message: "使用弱加密算法 (MD5/SHA1)"
    languages: [swift]
    severity: WARNING
    metadata:
      language: "swift"
      category: "security"
      cwe: "CWE-328"
    fix: |
      // ✅ 修复后
      import CryptoKit
      let hash = SHA256.hash(data: data)

  - id: swift-hardcoded-secret
    patterns:
      - pattern: |
          let $SECRET = "..."
      - metavariable-regex:
          metavariable: $SECRET
          regex: "(?i)(password|apikey|secret|token)"
    message: "硬编码的密钥"
    languages: [swift]
    severity: ERROR
    metadata:
      language: "swift"
      category: "security"
    fix: |
      // ✅ 修复后
      let secret = ProcessInfo.processInfo.environment["SECRET"]

  - id: swift-uiwebview-deprecated
    patterns:
      - pattern: |
          UIWebView(...)
    message: "UIWebView 已废弃，存在安全风险，应使用 WKWebView"
    languages: [swift]
    severity: WARNING
    metadata:
      language: "swift"
      category: "security"
    fix: |
      // ✅ 修复后
      import WebKit
      let webView = WKWebView()

  # ==================== Kotlin 语言规则 ====================
  
  - id: kotlin-sql-injection
    patterns:
      - pattern: |
          db.rawQuery("SELECT ... WHERE ... = $USER_INPUT", ...)
    message: "SQL 注入风险"
    languages: [kotlin]
    severity: ERROR
    metadata:
      language: "kotlin"
      category: "security"
      cwe: "CWE-89"
    fix: |
      // ✅ 修复后
      val query = "SELECT ... WHERE ... = ?"
      db.rawQuery(query, arrayOf(userInput))

  - id: kotlin-hardcoded-secret
    patterns:
      - pattern: |
          const val $SECRET = "..."
      - metavariable-regex:
          metavariable: $SECRET
          regex: "(?i)(password|apikey|secret|token)"
    message: "硬编码的密钥"
    languages: [kotlin]
    severity: ERROR
    metadata:
      language: "kotlin"
      category: "security"
    fix: |
      // ✅ 修复后
      val secret = System.getenv("SECRET")

  - id: kotlin-insecure-random
    patterns:
      - pattern: |
          Random.nextInt()
      - pattern-inside: |
          fun generateToken() { ... }
    message: "java.util.Random 不适合安全场景"
    languages: [kotlin]
    severity: WARNING
    metadata:
      language: "kotlin"
      category: "security"
      cwe: "CWE-330"
    fix: |
      // ✅ 修复后
      import java.security.SecureRandom
      val random = SecureRandom()

  - id: kotlin-missing-null-check
    patterns:
      - pattern: |
          $VAR!!.$METHOD()
    message: "使用 !! 可能抛出 NullPointerException"
    languages: [kotlin]
    severity: WARNING
    metadata:
      language: "kotlin"
      category: "best-practice"
    fix: |
      // ✅ 修复后
      $VAR?.$METHOD() ?: defaultValue

  # ==================== Ruby 语言规则 ====================
  
  - id: ruby-sql-injection
    patterns:
      - pattern: |
          Model.where("... #{$VAR} ...")
      - pattern: |
          Model.find_by_sql("... #{$VAR} ...")
    message: "SQL 注入风险"
    languages: [ruby]
    severity: ERROR
    metadata:
      language: "ruby"
      category: "security"
      cwe: "CWE-89"
    fix: |
      # ✅ 修复后
      Model.where("field = ?", $var)

  - id: ruby-eval-user-input
    patterns:
      - pattern: |
          eval($USER_INPUT)
    message: "eval 用户输入极其危险"
    languages: [ruby]
    severity: ERROR
    metadata:
      language: "ruby"
      category: "security"
      cwe: "CWE-95"
    fix: |
      # ✅ 修复后
      # 避免使用 eval，使用更安全的替代方案

  - id: ruby-weak-crypto
    patterns:
      - pattern: |
          Digest::MD5.hexdigest($DATA)
      - pattern: |
          Digest::SHA1.hexdigest($DATA)
    message: "使用弱加密算法"
    languages: [ruby]
    severity: WARNING
    metadata:
      language: "ruby"
      category: "security"
      cwe: "CWE-328"
    fix: |
      # ✅ 修复后
      Digest::SHA256.hexdigest(data)

  - id: ruby-hardcoded-secret
    patterns:
      - pattern: |
          $SECRET = "..."
      - metavariable-regex:
          metavariable: $SECRET
          regex: "(?i)(password|apikey|secret|token)"
    message: "硬编码的密钥"
    languages: [ruby]
    severity: ERROR
    metadata:
      language: "ruby"
      category: "security"
    fix: |
      # ✅ 修复后
      SECRET = ENV['SECRET']

  # ==================== PHP 语言规则 ====================
  
  - id: php-sql-injection
    patterns:
      - pattern: |
          mysqli_query($conn, "SELECT ... WHERE ... = $USER_INPUT")
      - pattern: |
          $pdo->query("SELECT ... WHERE ... = $USER_INPUT")
    message: "SQL 注入风险"
    languages: [php]
    severity: ERROR
    metadata:
      language: "php"
      category: "security"
      cwe: "CWE-89"
    fix: |
      // ✅ 修复后
      $stmt = $pdo->prepare("SELECT ... WHERE ... = ?");
      $stmt->execute([$userInput]);

  - id: php-xss-echo
    patterns:
      - pattern: |
          echo $USER_INPUT
      - pattern: |
          print $USER_INPUT
    message: "直接输出用户输入可能导致 XSS"
    languages: [php]
    severity: WARNING
    metadata:
      language: "php"
      category: "security"
      cwe: "CWE-79"
    fix: |
      // ✅ 修复后
      echo htmlspecialchars($userInput, ENT_QUOTES, 'UTF-8');

  - id: php-command-injection
    patterns:
      - pattern: |
          system($USER_INPUT)
      - pattern: |
          exec($USER_INPUT)
      - pattern: |
          shell_exec($USER_INPUT)
    message: "命令注入风险"
    languages: [php]
    severity: ERROR
    metadata:
      language: "php"
      category: "security"
      cwe: "CWE-78"
    fix: |
      // ✅ 修复后
      // 避免使用系统命令，或使用 escapeshellarg()
      system(escapeshellcmd($userInput));

  - id: php-weak-crypto
    patterns:
      - pattern: |
          md5($DATA)
      - pattern: |
          sha1($DATA)
    message: "使用弱加密算法"
    languages: [php]
    severity: WARNING
    metadata:
      language: "php"
      category: "security"
      cwe: "CWE-328"
    fix: |
      // ✅ 修复后
      hash('sha256', $data)

  - id: php-hardcoded-secret
    patterns:
      - pattern: |
          $password = "...";
      - pattern: |
          $api_key = "...";
    message: "硬编码的密钥"
    languages: [php]
    severity: ERROR
    metadata:
      language: "php"
      category: "security"
    fix: |
      // ✅ 修复后
      $password = getenv('PASSWORD');
